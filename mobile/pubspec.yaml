name: sanad_app
description: Sanad - Caregiver Connection App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  mobile_scanner: ^6.0.0
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  flutter_webrtc: ^0.12.0
  web_socket_channel: ^2.4.0
  socket_io_client: ^2.0.3
  firebase_messaging: ^16.2.0

#HTTP requests
  http: ^1.2.2
#Local storage
  shared_preferences: ^2.3.3
  provider: ^6.1.5+1
  geolocator: ^13.0.2
  record: ^5.2.1
  audioplayers: ^6.1.0
  path_provider: ^2.1.4
  url_launcher: ^6.3.0
  battery_plus: ^4.0.1
  sensors_plus: ^4.0.2


dependency_overrides:
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
  fonts:
    - family: Montserrat
      fonts:
        - asset: fonts/Montserrat-Regular.ttf
        - asset: fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: fonts/Montserrat-SemiBold.ttf
          weight: 600